<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-reflect" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF9800"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="360" fill="white"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">agentic-kit: Standard Infrastructure for AI Agent Systems</text>
  <text x="450" y="46" text-anchor="middle" font-size="11" fill="#777">Agents need infrastructure, not just prompts</text>

  <!-- ============ DMS Lifecycle Banner ============ -->
  <rect x="80" y="62" width="740" height="24" rx="4" fill="#F5F5F5" stroke="#999" stroke-width="1"/>
  <text x="450" y="79" text-anchor="middle" font-size="10" fill="#555">DMS Lifecycle: FRAME → SPAR → GATE → COMMIT → <tspan font-weight="bold" fill="#1976D2">ENACT</tspan> → <tspan font-weight="bold" fill="#1976D2">YIELD</tspan> → <tspan font-weight="bold" fill="#1976D2">GAUGE</tspan></text>

  <!-- ============ Four Modules ============ -->
  <!-- Module 1: Semantic Memory -->
  <rect x="80" y="110" width="170" height="120" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="165" y="136" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">🧠 Memory</text>
  <text x="165" y="160" text-anchor="middle" font-size="10" fill="#555">Semantic retrieval</text>
  <text x="165" y="175" text-anchor="middle" font-size="10" fill="#555">Embedding + keyword</text>
  <text x="165" y="190" text-anchor="middle" font-size="10" fill="#555">fallback</text>
  <text x="165" y="215" text-anchor="middle" font-size="9" fill="#999">Context for decisions</text>

  <!-- Arrow 1 -->
  <line x1="250" y1="170" x2="278" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Module 2: Dispatchers -->
  <rect x="280" y="110" width="170" height="120" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="365" y="136" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">🚀 Dispatchers</text>
  <text x="365" y="160" text-anchor="middle" font-size="10" fill="#555">Pluggable execution</text>
  <text x="365" y="175" text-anchor="middle" font-size="10" fill="#555">Logging, HTTP,</text>
  <text x="365" y="190" text-anchor="middle" font-size="10" fill="#555">dry-run backends</text>
  <rect x="310" y="208" width="110" height="18" rx="9" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="365" y="221" text-anchor="middle" font-size="9" font-weight="bold" fill="#2E7D32">ENACT phase</text>

  <!-- Arrow 2 -->
  <line x1="450" y1="170" x2="478" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Module 3: Circuit Breakers -->
  <rect x="480" y="110" width="170" height="120" rx="8" fill="#FFEBEE" stroke="#F44336" stroke-width="2"/>
  <text x="565" y="136" text-anchor="middle" font-size="13" font-weight="bold" fill="#C62828">🔒 Circuit Breakers</text>
  <text x="565" y="160" text-anchor="middle" font-size="10" fill="#555">Failure handling</text>
  <text x="565" y="175" text-anchor="middle" font-size="10" fill="#555">Rate limiting</text>
  <text x="565" y="190" text-anchor="middle" font-size="10" fill="#555">Runaway prevention</text>
  <rect x="510" y="208" width="110" height="18" rx="9" fill="#FFEBEE" stroke="#F44336" stroke-width="1"/>
  <text x="565" y="221" text-anchor="middle" font-size="9" font-weight="bold" fill="#C62828">YIELD phase</text>

  <!-- Arrow 3 -->
  <line x1="650" y1="170" x2="678" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Module 4: Reflection -->
  <rect x="680" y="110" width="140" height="120" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="750" y="136" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">🔄 Reflection</text>
  <text x="750" y="160" text-anchor="middle" font-size="10" fill="#555">Post-action critique</text>
  <text x="750" y="175" text-anchor="middle" font-size="10" fill="#555">Re-deliberation</text>
  <text x="750" y="190" text-anchor="middle" font-size="10" fill="#555">Self-correction</text>
  <rect x="695" y="208" width="110" height="18" rx="9" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
  <text x="750" y="221" text-anchor="middle" font-size="9" font-weight="bold" fill="#E65100">GAUGE phase</text>

  <!-- Reflection feedback loop -->
  <path d="M 750 230 L 750 270 L 165 270 L 165 230" fill="none" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-reflect)"/>
  <text x="457" y="285" text-anchor="middle" font-size="10" fill="#E65100" font-style="italic">Reflection loop: learn from execution, update memory</text>

  <!-- ============ Legend ============ -->
  <rect x="180" y="315" width="12" height="12" rx="2" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
  <text x="198" y="326" font-size="10" fill="#555">Context Retrieval</text>

  <rect x="330" y="315" width="12" height="12" rx="2" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="348" y="326" font-size="10" fill="#555">Safe Execution</text>

  <rect x="470" y="315" width="12" height="12" rx="2" fill="#FFEBEE" stroke="#F44336" stroke-width="1"/>
  <text x="488" y="326" font-size="10" fill="#555">Failure Safety</text>

  <rect x="600" y="315" width="12" height="12" rx="2" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
  <text x="618" y="326" font-size="10" fill="#555">Self-Correction</text>
</svg>
